name: Auto Update Sitemap
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests curl_cffi
      - name: Run script
        run: python purify.py
      - name: Commit and Push
        run: |
          git config --global user.name 'SitemapBot'
          git config --global user.email 'bot@github.com'
          git add sitemap_part*.xml
          git commit -m "Update sitemaps" || exit 0
          git push origin main
